name: Audit K-Health365 Indexing (일회성 수동 실행)

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run audit script
        env:
          KHEALTH365COM: ${{ secrets.KHEALTH365COM }}
        run: python scripts/audit_khealth_indexing.py

      - name: Commit results file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit_khealth_results.txt
          git diff --staged --quiet || git commit -m "chore: k-health365 색인 전수조사 결과 [skip ci]"
          git push
