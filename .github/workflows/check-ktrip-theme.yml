name: Check ktrip365 theme now
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env:
          KTRIP365COM: ${{ secrets.KTRIP365COM }}
        run: python .github/workflows/check_ktrip_theme.py
      - name: Commit
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add ktrip_theme_check.txt
          git commit -m "ktrip365 테마 재확인" || echo "no changes"
          git push || (git pull --rebase origin main && git push)
