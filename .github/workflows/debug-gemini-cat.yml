name: Debug Gemini Category Response

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests google-genai beautifulsoup4 lxml -q
      - name: "Gemini 카테고리 응답 확인"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/debug_gemini_cat.py
