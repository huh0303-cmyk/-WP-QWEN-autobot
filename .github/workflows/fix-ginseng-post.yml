name: Fix Ginseng Post (k-health365.com)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fix ginseng post (code fence + image)
        env:
          KHEALTH365COM: ${{ secrets.KHEALTH365COM }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        run: python scripts/fix_ginseng_post.py

      - name: Commit results file
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add fix_ginseng_post_results.txt
          git commit -m "결과: 홍삼 글 코드펜스/이미지 수정 로그" || echo "no changes"
          git push || (git pull --rebase origin main && git push)
