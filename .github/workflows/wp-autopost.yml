name: WordPress Auto Posting (Qwen Mega Chain)
on:
  schedule:
    # ⏱️ [1번 봇] 한국 시간(KST) 밤 10시 30분 실행 (UTC 13:30) — 단일 사이트, 자정 전 가볍게
    - cron: '30 13 * * *'

    # ⏱️ [2번 봇] 한국 시간(KST) 00시 10분 실행 (UTC 15:10)
    # ✅ Gemini 일일 쿼터가 KST 00:00에 리셋되므로, 호출량이 가장 많은 mega-bot(22개 사이트)을
    #    쿼터 리셋 직후로 옮겨 429 레이트리밋 위험을 최소화함
    - cron: '10 15 * * *'

    # ⏱️ [3번 봇] 한국 시간(KST) 새벽 2시 30분 실행 (UTC 17:30)
    - cron: '30 17 * * *'

    # ⏱️ [4번 봇] 한국 시간(KST) 새벽 3시 30분 실행 (UTC 18:30)
    - cron: '30 18 * * *'
  workflow_dispatch: # 수동 즉시 가동 버튼 활성화

# 동일 네트워크 자산 충돌을 방지하기 위한 안전 장치
concurrency:
  group: wordpress-qwen-chain
  cancel-in-progress: false

jobs:
  # 🟢 1. K-Health 전용 봇 (밤 10시 30분 스케줄 또는 수동 실행 시 첫 타자로 시동)
  khealth-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 13 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run K-Health Bot (Qwen + Free Images)
        run: python autopost_khealth.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 2. 22개 사이트 메가 봇 (00시 10분 스케줄 또는 수동 실행 시 순차 연동)
  # ✅ needs 제거: GitHub Actions는 needs로 연결된 선행 job이 그 시점에 if=false라 skipped로
  #    끝나면, 이 job의 if가 true여도 always() 없이는 자동으로 skipped 처리해버림.
  #    그 결과 기존 워크플로우는 스케줄 트리거 시 khealth-bot 외 나머지 3개 봇이
  #    전혀 자동 실행되지 않고 있었을 가능성이 매우 높음 (수동 실행에서만 정상 동작).
  #    concurrency 그룹이 이미 동시 실행을 막아주므로 needs 없이도 안전함.
  mega-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '10 15 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Mega Bot (Qwen Multi-Chain)
        run: python autopost_mega.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 3. 한국어 뉴스 봇 (새벽 2시 30분 스케줄 또는 수동 실행 시 순차 연동)
  newsbot-korea:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 17 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Korean News Bot (Qwen System)
        run: python newsbot_korea.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 4. 서울 저널 영어 뉴스 봇 (새벽 3시 30분 스케줄 또는 수동 실행 시 순차 연동)
  newsbot-seoul:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 18 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Seoul Journal News Bot
        run: python newsbot_seoul.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}
