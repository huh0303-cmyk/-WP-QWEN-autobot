name: WordPress Auto Posting (Qwen Mega Chain)

on:
  schedule:
    # ⏱️ [1번 봇] 한국 시간(KST) 밤 10시 정각 실행 (UTC 13:00)
    - cron: '0 13 * * *'
    
    # ⏱️ [2번 봇] 한국 시간(KST) 밤 11시 30분 실행 (UTC 14:30)
    - cron: '30 14 * * *'
    
    # ⏱️ [3번 봇] 한국 시간(KST) 새벽 1시 30분 실행 (UTC 16:30)
    - cron: '30 16 * * *'
    
    # ⏱️ [4번 봇] 한국 시간(KST) 새벽 2시 30분 실행 (UTC 17:30)
    - cron: '30 17 * * *'

  workflow_dispatch: # 수동 즉시 가동 버튼 활성화

# 동일 네트워크 자산 충돌을 방지하기 위한 안전 장치
concurrency:
  group: wordpress-qwen-chain
  cancel-in-progress: false

jobs:
  # 🟢 1. K-Health 전용 봇 (밤 10시 스케줄 또는 수동 실행 시 첫 타자로 시동)
  khealth-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run K-Health Bot (Qwen + Free Images)
        run: python autopost_khealth.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 2. 22개 사이트 메가 봇 (밤 11시 30분 스케줄 또는 1번 봇 완료 후 수동 연동)
  mega-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    continue-on-error: true
    # 수동 실행 시에는 1번 봇이 끝난 후 순차 실행되도록 제어
    needs: khealth-bot
    if: |
      (github.event_name == 'workflow_dispatch' && always()) || 
      (github.event_name == 'schedule' && github.event.schedule == '30 14 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Mega Bot (Qwen Multi-Chain)
        run: python autopost_mega.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 3. 한국어 뉴스 봇 (새벽 1시 30분 스케줄 또는 2번 봇 완료 후 수동 연동)
  newsbot-korea:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    needs: mega-bot
    if: |
      (github.event_name == 'workflow_dispatch' && always()) || 
      (github.event_name == 'schedule' && github.event.schedule == '30 16 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Korean News Bot (Qwen System)
        run: python newsbot_korea.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  # 🟢 4. 서울 저널 영어 뉴스 봇 (새벽 2시 30분 스케줄 또는 3번 봇 완료 후 수동 연동)
  newsbot-seoul:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    needs: newsbot-korea
    if: |
      (github.event_name == 'workflow_dispatch' && always()) || 
      (github.event_name == 'schedule' && github.event.schedule == '30 17 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Seoul Journal News Bot
        run: python newsbot_seoul.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}
