name: Create Kworld365 Privacy Page (일회성 수동 실행)

on:
  workflow_dispatch:

jobs:
  create-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Create page
        env:
          KWORLD365COM: ${{ secrets.KWORLD365COM }}
        run: python create_privacy_page.py
