name: "🚀 MASTER — 27사이트 AdSense 승인 자동화"

on:
  workflow_dispatch:
    inputs:
      step:
        description: "setup=구조작업 / post=글발행 / ads=ads.txt삽입 / all=전체"
        required: false
        default: "post"
      run_slot:
        description: "슬롯 1=오전 2=오후 3=저녁"
        required: false
        default: "1"
  schedule:
    - cron: "10 21 * * *"   # KST 06:10  슬롯1
    - cron: "10 5 * * *"    # KST 14:10  슬롯2
    - cron: "10 13 * * *"   # KST 22:10  슬롯3

concurrency:
  group: master-27sites
  cancel-in-progress: false

jobs:
# ══════════════════════════════════════════════════════════
# JOB 1: 슬롯 결정
# ══════════════════════════════════════════════════════════
  determine-slot:
    runs-on: ubuntu-latest
    outputs:
      slot:      ${{ steps.slot.outputs.slot }}
      run_setup: ${{ steps.slot.outputs.run_setup }}
      run_post:  ${{ steps.slot.outputs.run_post }}
    steps:
      - id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ github.event.inputs.run_slot }}"
            S="${{ github.event.inputs.step }}"
            if [ "$S" = "setup" ] || [ "$S" = "all" ]; then
              RUN_SETUP=true
            else
              RUN_SETUP=false
            fi
            if [ "$S" = "post" ] || [ "$S" = "all" ]; then
              RUN_POST=true
            else
              RUN_POST=false
            fi
          elif [ "${{ github.event.schedule }}" = "10 21 * * *" ]; then
            SLOT=1; RUN_SETUP=false; RUN_POST=true
          elif [ "${{ github.event.schedule }}" = "10 5 * * *" ]; then
            SLOT=2; RUN_SETUP=false; RUN_POST=true
          else
            SLOT=3; RUN_SETUP=false; RUN_POST=true
          fi
          echo "slot=$SLOT"           >> "$GITHUB_OUTPUT"
          echo "run_setup=$RUN_SETUP" >> "$GITHUB_OUTPUT"
          echo "run_post=$RUN_POST"   >> "$GITHUB_OUTPUT"
          echo "▶ 슬롯=$SLOT | 구조작업=$RUN_SETUP | 글발행=$RUN_POST"


# ══════════════════════════════════════════════════════════
# JOB: ads.txt 전용 삽입 (step=ads 실행 시)
# ══════════════════════════════════════════════════════════
  inject-ads:
    needs: determine-slot
    if: ${{ github.event.inputs.step == 'ads' || github.event.inputs.step == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - name: "📄 27개 사이트 ads.txt 강제 삽입"
        env:
          KHEALTH365COM:        ${{ secrets.KHEALTH365COM }}
          KOREAMEDICALTOURCOM:  ${{ secrets.KOREAMEDICALTOURCOM }}
          KOREAINVEST365COM:    ${{ secrets.KOREAINVEST365COM }}
          KIKOREACOM:           ${{ secrets.KIKOREACOM }}
          KOREAINSURANCE365COM: ${{ secrets.KOREAINSURANCE365COM }}
          KFINANCE365COM:       ${{ secrets.KFINANCE365COM }}
          KOREATAXNLAWCOM:      ${{ secrets.KOREATAXNLAWCOM }}
          KOREACRYPTO365COM:    ${{ secrets.KOREACRYPTO365COM }}
          KREALESTATE365COM:    ${{ secrets.KREALESTATE365COM }}
          KTECH365COM:          ${{ secrets.KTECH365COM }}
          KSKIN365COM:          ${{ secrets.KSKIN365COM }}
          OLIVEYOUNGKOREACOM:   ${{ secrets.OLIVEYOUNGKOREACOM }}
          KWORLD365COM:         ${{ secrets.KWORLD365COM }}
          KTRIP365COM:          ${{ secrets.KTRIP365COM }}
          KVISA365COM:          ${{ secrets.KVISA365COM }}
          KOREAWEDDING365COM:   ${{ secrets.KOREAWEDDING365COM }}
          KSTUDY365COM:         ${{ secrets.KSTUDY365COM }}
          STUDYINKOREA365COM:   ${{ secrets.STUDYINKOREA365COM }}
          KIECAKOREAORG:        ${{ secrets.KIECAKOREAORG }}
          KSAKOREAORG:          ${{ secrets.KSAKOREAORG }}
          SISKOREACOM:          ${{ secrets.SISKOREACOM }}
          JOBKOREA365COM:       ${{ secrets.JOBKOREA365COM }}
          JOBINKOREA365COM:     ${{ secrets.JOBINKOREA365COM }}
          JOBKOREAGLOBALCOM:    ${{ secrets.JOBKOREAGLOBALCOM }}
          KOREA365ORG:          ${{ secrets.KOREA365ORG }}
          KOREANEWS365COM:      ${{ secrets.KOREANEWS365COM }}
          THESEOULJOURNALCOM:   ${{ secrets.THESEOULJOURNALCOM }}
        run: python .github/workflows/inject_ads_txt.py
# ══════════════════════════════════════════════════════════
# JOB 2: 연결 테스트 (HTTP 0 사전 감지)
# ══════════════════════════════════════════════════════════
  connection-test:
    needs: determine-slot
    runs-on: ubuntu-latest
    outputs:
      can_connect: ${{ steps.test.outputs.can_connect }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - id: test
        name: "🔌 연결 테스트"
        env:
          KHEALTH365COM:   ${{ secrets.KHEALTH365COM }}
          KOREANEWS365COM: ${{ secrets.KOREANEWS365COM }}
          KFINANCE365COM:  ${{ secrets.KFINANCE365COM }}
        run: |
          python3 -c "
          import requests, os, sys, time
          WP_USER = 'huh0303@gmail.com'
          test_sites = [
              ('https://k-health365.com', os.getenv('KHEALTH365COM','')),
              ('https://koreanews365.com', os.getenv('KOREANEWS365COM','')),
              ('https://kfinance365.com', os.getenv('KFINANCE365COM','')),
          ]
          ok = 0
          for url, pw in test_sites:
              if not pw: continue
              for attempt in range(3):
                  try:
                      r = requests.get(f'{url}/wp-json/wp/v2/posts',
                                      auth=(WP_USER, pw),
                                      params={'per_page':1},
                                      timeout=20,
                                      headers={'User-Agent':'WordPress/6.0'})
                      if r.status_code < 500:
                          print(f'✅ {url}: HTTP {r.status_code}')
                          ok += 1; break
                  except Exception as e:
                      print(f'⚠️ {url} 시도{attempt+1}: {e}')
                      time.sleep(15)
          print(f'연결 성공: {ok}/3')
          # 1개라도 연결되면 진행
          sys.exit(0 if ok >= 1 else 1)
          "
          echo "can_connect=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

# ══════════════════════════════════════════════════════════
# JOB 3: 사이트 구조 설정
# ══════════════════════════════════════════════════════════
  site-setup:
    needs: [determine-slot, connection-test]
    if: ${{ needs.determine-slot.outputs.run_setup == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - name: "🔧 27개 사이트 구조 설정"
        env:
          KHEALTH365COM:        ${{ secrets.KHEALTH365COM }}
          KOREAMEDICALTOURCOM:  ${{ secrets.KOREAMEDICALTOURCOM }}
          KOREAINVEST365COM:    ${{ secrets.KOREAINVEST365COM }}
          KIKOREACOM:           ${{ secrets.KIKOREACOM }}
          KOREAINSURANCE365COM: ${{ secrets.KOREAINSURANCE365COM }}
          KFINANCE365COM:       ${{ secrets.KFINANCE365COM }}
          KOREATAXNLAWCOM:      ${{ secrets.KOREATAXNLAWCOM }}
          KOREACRYPTO365COM:    ${{ secrets.KOREACRYPTO365COM }}
          KREALESTATE365COM:    ${{ secrets.KREALESTATE365COM }}
          KTECH365COM:          ${{ secrets.KTECH365COM }}
          KSKIN365COM:          ${{ secrets.KSKIN365COM }}
          OLIVEYOUNGKOREACOM:   ${{ secrets.OLIVEYOUNGKOREACOM }}
          KWORLD365COM:         ${{ secrets.KWORLD365COM }}
          KTRIP365COM:          ${{ secrets.KTRIP365COM }}
          KVISA365COM:          ${{ secrets.KVISA365COM }}
          KOREAWEDDING365COM:   ${{ secrets.KOREAWEDDING365COM }}
          KSTUDY365COM:         ${{ secrets.KSTUDY365COM }}
          STUDYINKOREA365COM:   ${{ secrets.STUDYINKOREA365COM }}
          KIECAKOREAORG:        ${{ secrets.KIECAKOREAORG }}
          KSAKOREAORG:          ${{ secrets.KSAKOREAORG }}
          SISKOREACOM:          ${{ secrets.SISKOREACOM }}
          JOBKOREA365COM:       ${{ secrets.JOBKOREA365COM }}
          JOBINKOREA365COM:     ${{ secrets.JOBINKOREA365COM }}
          JOBKOREAGLOBALCOM:    ${{ secrets.JOBKOREAGLOBALCOM }}
          KOREA365ORG:          ${{ secrets.KOREA365ORG }}
          KOREANEWS365COM:      ${{ secrets.KOREANEWS365COM }}
          THESEOULJOURNALCOM:   ${{ secrets.THESEOULJOURNALCOM }}
          SHEETS_WEBHOOK:       ${{ secrets.SHEETS_WEBHOOK }}
        run: python .github/workflows/setup_sites.py

# ══════════════════════════════════════════════════════════
# JOB 4: 자동 포스팅
# ══════════════════════════════════════════════════════════
  autopost:
    needs: [determine-slot, connection-test]
    if: ${{ needs.determine-slot.outputs.run_post == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "패키지 캐시"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-autopost-v4
      - run: pip install requests google-genai beautifulsoup4 lxml -q
      - name: "⏳ 연결 안정화 대기 (30초)"
        run: sleep 30
      - name: "📝 오토포스팅 Slot ${{ needs.determine-slot.outputs.slot }}"
        env:
          RUN_SLOT:             ${{ needs.determine-slot.outputs.slot }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY:          ${{ secrets.PIXABAY_KEY }}
          PEXELS_KEY:           ${{ secrets.PEXELS_KEY }}
          SHEETS_WEBHOOK:       ${{ secrets.SHEETS_WEBHOOK }}
          KHEALTH365COM:        ${{ secrets.KHEALTH365COM }}
          KOREAMEDICALTOURCOM:  ${{ secrets.KOREAMEDICALTOURCOM }}
          KOREAINVEST365COM:    ${{ secrets.KOREAINVEST365COM }}
          KIKOREACOM:           ${{ secrets.KIKOREACOM }}
          KOREAINSURANCE365COM: ${{ secrets.KOREAINSURANCE365COM }}
          KFINANCE365COM:       ${{ secrets.KFINANCE365COM }}
          KOREATAXNLAWCOM:      ${{ secrets.KOREATAXNLAWCOM }}
          KOREACRYPTO365COM:    ${{ secrets.KOREACRYPTO365COM }}
          KREALESTATE365COM:    ${{ secrets.KREALESTATE365COM }}
          KTECH365COM:          ${{ secrets.KTECH365COM }}
          KSKIN365COM:          ${{ secrets.KSKIN365COM }}
          OLIVEYOUNGKOREACOM:   ${{ secrets.OLIVEYOUNGKOREACOM }}
          KWORLD365COM:         ${{ secrets.KWORLD365COM }}
          KTRIP365COM:          ${{ secrets.KTRIP365COM }}
          KVISA365COM:          ${{ secrets.KVISA365COM }}
          KOREAWEDDING365COM:   ${{ secrets.KOREAWEDDING365COM }}
          KSTUDY365COM:         ${{ secrets.KSTUDY365COM }}
          STUDYINKOREA365COM:   ${{ secrets.STUDYINKOREA365COM }}
          KIECAKOREAORG:        ${{ secrets.KIECAKOREAORG }}
          KSAKOREAORG:          ${{ secrets.KSAKOREAORG }}
          SISKOREACOM:          ${{ secrets.SISKOREACOM }}
          JOBKOREA365COM:       ${{ secrets.JOBKOREA365COM }}
          JOBINKOREA365COM:     ${{ secrets.JOBINKOREA365COM }}
          JOBKOREAGLOBALCOM:    ${{ secrets.JOBKOREAGLOBALCOM }}
          KOREA365ORG:          ${{ secrets.KOREA365ORG }}
          KOREANEWS365COM:      ${{ secrets.KOREANEWS365COM }}
          THESEOULJOURNALCOM:   ${{ secrets.THESEOULJOURNALCOM }}
        run: python .github/workflows/autopost_mega.py
