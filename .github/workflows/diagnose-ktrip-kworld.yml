name: Diagnose Ktrip Kworld (일회성 수동 실행)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run diagnosis
        continue-on-error: true
        env:
          KTRIP365COM: ${{ secrets.KTRIP365COM }}
          KWORLD365COM: ${{ secrets.KWORLD365COM }}
        run: python diagnose_ktrip_kworld.py > diagnose_ktrip_kworld_results.txt 2>&1
      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnose_ktrip_kworld_results.txt
          git diff --staged --quiet || git commit -m "chore: k-trip365/kworld365 진단 결과 [skip ci]"
          git push
