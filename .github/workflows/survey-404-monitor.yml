name: Survey 404 Monitor - 26 SITES (read-only)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  survey:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run survey (read-only)
        env:
          WP_REAL_PASSWORD: ${{ secrets.WP_REAL_PASSWORD }}
        run: python scripts/survey_404_monitor.py

      - name: Commit results file
        if: always()
        run: |
          git config user.name "survey-bot"
          git config user.email "survey-bot@users.noreply.github.com"
          git add survey_404_result.json
          git commit -m "결과 업데이트: survey_404_monitor 실행 로그" || echo "no changes"
          git push
