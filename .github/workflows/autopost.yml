name: WordPress Mega Auto Posting

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python autopost_mega.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ github.run_number }}
          path: result_*.csv
