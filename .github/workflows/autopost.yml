 name: WordPress 전체 자동 포스팅

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  khealth-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python autopost_khealth.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  mega-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    continue-on-error: true
    needs: khealth-bot
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python autopost_mega.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  newsbot-korea:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    continue-on-error: true
    needs: mega-bot
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python newsbot_korea.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  newsbot-seoul:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    continue-on-error: true
    needs: newsbot-korea
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python newsbot_seoul.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}
