name: WordPress 전체 자동 포스팅

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  khealth-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python autopost_khealth.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  mega-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python autopost_mega.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  newsbot-korea:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python newsbot_korea.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}

  newsbot-seoul:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python newsbot_seoul.py
        env:
          SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}
