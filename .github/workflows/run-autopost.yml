name: Auto Post Mega Bot

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: '0 15 * * *'    # 매일 자동 실행

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 레포지토리 코드 다운로드
      uses: actions/checkout@v4

    - name: 2. 파이썬 3.11 환경 빌드
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 필수 패키지 강제 업그레이드 및 dotenv 설치
      run: |
        python -m pip install --upgrade pip
        # 📌 바로 이 부분에 범인이었던 python-dotenv 패키지를 강제로 주입합니다!
        pip install requests setuptools wheel python-dotenv

    - name: 4. 메가 오토포스팅 엔진 구동
      env:
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        SHEETS_WEBHOOK: ${{ secrets.SHEETS_WEBHOOK }}
        WP_PASS_HEALTH: ${{ secrets.WP_PASS_HEALTH }}
        WP_PASS_NEWS: ${{ secrets.WP_PASS_NEWS }}
        WP_PASS_JOURNAL: ${{ secrets.WP_PASS_JOURNAL }}
      run: |
        python .github/workflows/autopost_mega.py
