name: Fix Menu Typo (theseouljournal.com)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - name: Fix menu typo
        env:
          THESEOULJOURNALCOM: ${{ secrets.THESEOULJOURNALCOM }}
        run: python scripts/fix_menu_typo.py
      - name: Commit result
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add fix_menu_typo_result.txt
          git commit -m "결과: 메뉴 오타 수정 로그" || echo "no changes"
          git push || (git pull --rebase origin main && git push)
