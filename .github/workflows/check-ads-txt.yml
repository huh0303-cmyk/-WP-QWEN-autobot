name: Check ads.txt All Sites

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python .github/workflows/check_ads_txt.py
      - name: Commit results
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git add ads_txt_check_results.txt
          git commit -m "ads.txt 점검 결과" || echo "no changes"
          git push
