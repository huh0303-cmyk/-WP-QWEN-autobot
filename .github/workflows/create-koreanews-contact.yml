name: Create Koreanews365 Contact Page (일회성 수동 실행)

on:
  workflow_dispatch:

jobs:
  create-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Create page
        env:
          KOREANEWS365COM: ${{ secrets.KOREANEWS365COM }}
        run: python scripts/create_koreanews_contact.py
