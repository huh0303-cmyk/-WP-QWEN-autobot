name: Check ads.txt

on:
  workflow_dispatch: {}

jobs:
  check-ads-txt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ads.txt check
        run: python .github/workflows/check_ads_txt.py
