name: Test SmartStore Login

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install playwright -q
          python -m playwright install --with-deps chromium
      - name: Test login
        run: python scripts/test_smartstore_login.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartstore-screenshots
          path: "*.png"
