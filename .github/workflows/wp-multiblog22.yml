name: MultiBlog 22 English Stealth Engine

on:
  schedule:
    # 한국 시간 기준 매일 오전 02:10, 오전 08:10, 오후 14:10, 오후 20:10 총 4번 실행
    - cron: '10 17 * * *'
    - cron: '10 23 * * *'
    - cron: '10 5 * * *'
    - cron: '10 11 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Run Stealth Autopost
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      run: |
        pip install requests openai google-generativeai python-dotenv
        python autopost_mega.py
