name: Diag Nonce Routes

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env:
          WP_REAL_PASSWORD: ${{ secrets.WP_REAL_PASSWORD }}
        run: python scripts/diag_nonce_routes.py
      - if: always()
        run: |
          git config user.name "diag-bot"
          git config user.email "diag-bot@users.noreply.github.com"
          git add diag_nonce_routes_result.json
          git commit -m "결과: diag_nonce_routes" || echo "no changes"
          git push
