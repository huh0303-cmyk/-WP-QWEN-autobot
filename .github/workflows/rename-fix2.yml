name: Rename Fix2
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env:
          KTRIP365COM: ${{ secrets.KTRIP365COM }}
          KWORLD365COM: ${{ secrets.KWORLD365COM }}
          KOREA365ORG: ${{ secrets.KOREA365ORG }}
        run: python scripts/rename_fix2.py
      - name: Commit
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add rename_fix2_results.txt
          git commit -m "리네임 재시도 결과" || echo "no changes"
          git push || (git pull --rebase origin main && git push)
