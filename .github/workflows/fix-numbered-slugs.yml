name: Fix K-Health365 Numbered Slugs (일회성 수동 실행)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true로 두면 실제 수정 없이 미리보기만"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  fix-slugs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fix script
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          KHEALTH365COM: ${{ secrets.KHEALTH365COM }}
        run: python fix_numbered_slugs.py

      - name: Commit results file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fix_numbered_slugs_results.txt
          git diff --staged --quiet || git commit -m "chore: 번호형 슬러그 수정 결과 [skip ci]"
          git push
