name: Check Subdomain Cleanup

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python .github/workflows/check_subdomains.py
      - name: Commit results
        if: always()
        run: |
          git config user.name "cleanup-bot"
          git config user.email "cleanup-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add subdomain_check_results.txt
          git commit -m "서브도메인 정리 확인 결과" || echo "no changes"
          git push || (git pull --rebase origin main && git push)
